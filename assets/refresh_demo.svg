<?xml version="1.0" encoding="UTF-8"?>
<svg width="480" height="120" viewBox="0 0 480 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Refresh demo">
  <style>
    .bg { fill:#ffffff }
    .step { font: 700 18px/1.2 Arial, sans-serif; fill:#111 }
    .muted { font: 400 14px/1.2 Arial, sans-serif; fill:#555 }
    .dot { fill:#217346 }
    .pulse { animation: pulse 1.6s infinite; }
    @keyframes pulse { 0% { opacity: 1; transform: scale(1);} 50% { opacity: .4; transform: scale(.95);} 100% { opacity: 1; transform: scale(1);} }
  </style>
  <rect class="bg" width="100%" height="100%" rx="8"/>
  <g transform="translate(24,20)">
    <text class="step">Open</text>
    <circle class="dot pulse" cx="0" cy="36" r="8"/>
    <text class="muted" x="24" y="40">Open workbook</text>
  </g>
  <g transform="translate(170,20)">
    <text class="step">Refresh</text>
    <circle class="dot" cx="0" cy="36" r="8"/>
    <text class="muted" x="24" y="40">Refresh query (Power Query)</text>
  </g>
  <g transform="translate(330,20)">
    <text class="step">Done</text>
    <circle class="dot" cx="0" cy="36" r="8"/>
    <text class="muted" x="24" y="40">Clean, analytics-ready table</text>
  </g>
</svg>
